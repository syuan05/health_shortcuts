<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>《自檢表》數位管理工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<style>

:root { --bg: #f7f5f2; --surface: #ffffff; --surface2: #f0ede8; --border: #e2ddd6; --text: #1a1714; --text2: #6b6560; --accent: #c4773a; --radius: 14px; --red: #c44040; --green: #3a7c5e; --water: #4a90e2; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; }
.app { max-width: 480px; margin: 0 auto; position: relative; }


/* 核心修復：確保卡片不會互相覆蓋 */
.card { 
    background: var(--surface); 
    border-radius: var(--radius); 
    border: 1px solid var(--border); 
    padding: 16px; 
    margin: 12px; 
    position: relative; 
    z-index: 1; 
}
.card-title { font-size: 14px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; }

/* 日期欄位修正：防止高度撐開擋住下方 */
#r-date { 
    width: 100%; 
    height: 42px;
    display: block; 
    -webkit-appearance: none; 
    background: #fff;
    font-family: inherit;
    font-size: 16px; /* 防止 iOS 自動放大 */
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
}

/* 儀表板 */
.total-box { background: #fffcf5; border: 1px solid #f0e6d2; padding: 15px 10px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
.total-item { display: flex; flex-direction: column; align-items: center; }
.total-val { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
.progress-bg { background: #e2ddd6; height: 6px; border-radius: 3px; width: 100%; margin: 0 auto; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; transition: 0.3s; }

/* 水量進度 */
.water-progress-wrap { margin-top: 10px; background: #f0f7ff; padding: 12px; border-radius: 8px; border: 1px solid #d0e3f7; }
.water-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--water); font-weight: bold; }

.item-block { background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); padding: 14px; margin-bottom: 15px; position: relative; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.lbl { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }

/* 輸入框優化 */
input, select { 
    width: 100%; 
    height: 42px; 
    padding: 8px; 
    border: 1px solid var(--border); 
    border-radius: 6px; 
    font-size: 14px; 
    background: #fff;
    position: relative;
    z-index: 2; /* 提高輸入框層級 */
}
::placeholder { color: #ccc; opacity: 1; }

.btn-add { width: 100%; padding: 12px; background: #fff; border: 1px dashed var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; margin-top: 5px; font-weight: 500; position: relative; z-index: 5; }
.btn-save { width: calc(100% - 24px); margin: 20px 12px; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; position: relative; z-index: 5; }

.img-preview { 
    width: 100%; 
    aspect-ratio: 4 / 3; /* 強制預覽框也是 4:3 */
    margin-top: 10px; 
    border-radius: 8px; 
    display: none; 
    overflow: hidden; 
    border: 1px solid #ddd; 
    background: #f0f0f0;
}
.img-preview img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* 確保圖片填滿且不變形 */
    display: block; 
}
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; z-index: 9999; pointer-events: none; transition: 0.3s; }
.toast.show { opacity: 1; }
.admin-btns { display: flex; gap: 8px; padding: 0 12px; margin-bottom: 40px; position: relative; z-index: 5; }
.btn-sec { flex: 1; padding: 10px; font-size: 11px; background: #eee; border: 1px solid #ddd; border-radius: 8px; color: #666; cursor: pointer; }
.combo-wrap { position: relative; width: 100%; }
.combo-select { position: absolute; top: 0; right: 0; width: 40px; height: 100%; border: none; background: transparent; color: transparent; cursor: pointer; opacity: 0.1; z-index: 3; }
.status-done { color: var(--green) !important; }
</style>
</head>
<body>
    <div class="app">
        <div class="card" style="text-align: center; padding: 10px;">
            <div id="db-status" style="font-size: 13px; color: #888;">
                <span id="status-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:gray; margin-right:5px;"></span>
                <span id="status-text">系統連線檢查中...</span>
            </div>
        </div>
      
        <div class="card"><label class="lbl">日期</label><input type="date" id="r-date" onchange="onDateChange()"></div>
    <div class="card">
    <div class="card-title">飲食進度</div>
    <div class="total-box">
      <div class="total-item"><div class="lbl">主食(3)</div><div id="val-carb" class="total-val">0</div><div class="progress-bg"><div id="bar-carb" class="progress-bar" style="background:var(--accent)"></div></div></div>
      <div class="total-item"><div class="lbl">蛋白(3)</div><div id="val-prot" class="total-val">0</div><div class="progress-bg"><div id="bar-prot" class="progress-bar" style="background:var(--green)"></div></div></div>
      <div class="total-item"><div class="lbl">蔬菜(4)</div><div id="val-veg" class="total-val">0</div><div class="progress-bg"><div id="bar-veg" class="progress-bar" style="background:var(--accent)"></div></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">飲食紀錄</div>
    <div id="meals-wrap"></div><button class="btn-add" onclick="addMeal()">＋ 新增一餐</button>
  </div>

  <div class="card">
    <div class="card-title">生活紀錄</div>
    <label class="lbl">每日步數 (目標 6000)</label>
    <input type="number" id="r-steps" placeholder="0" style="margin-bottom:8px" oninput="calcAll()" onchange="calcAll()" onkeyup="calcAll()">
    <div class="water-progress-wrap" style="background: #fff9f0; border-color: #f7e9d7; margin-bottom:15px">
        <div class="water-info" style="color: var(--accent)">
            <span>步數進度</span>
            <span id="steps-status-txt">還差 6000 步</span>
        </div>
        <div class="progress-bg">
            <div id="bar-steps" class="progress-bar" style="background:var(--accent)"></div>
        </div>
    </div>
    <label class="lbl">喝水量 (ml)</label>
    <input type="number" id="r-water" placeholder="0" oninput="calcAll()" onchange="calcAll()" onkeyup="calcAll()">
    <div class="water-progress-wrap">
        <div class="water-info"><span>進度</span><span id="water-status-txt">還差 2415 ml</span></div>
        <div class="progress-bg"><div id="bar-water" class="progress-bar" style="background:var(--water)"></div></div>
    </div>
    <div style="margin-top:15px"><label class="lbl">今日有運動？</label><select id="is-exercise" onchange="toggleExercise()"><option value="否">否</option><option value="是">是</option></select></div>
    <div id="exercise-content" style="display:none;margin-top:10px"><div id="exer-wrap"></div><button class="btn-add" onclick="addExer()">＋ 項目</button></div>
    <div style="margin-top:15px"><label class="lbl">吃了邪惡食物？</label><select id="r-evil"><option>否</option><option>是</option></select></div>
  </div>

  <div class="card">
    <div class="card-title">身體狀況</div>
    <div class="row3">
        <div><label class="lbl">壓力</label><div class="combo-wrap"><input type="number" id="r-stress" placeholder="0"><select class="combo-select" onchange="this.previousElementSibling.value=this.value"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div></div>
        <div><label class="lbl">疲勞</label><div class="combo-wrap"><input type="number" id="r-fatigue" placeholder="0"><select class="combo-select" onchange="this.previousElementSibling.value=this.value"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div></div>
        <div><label class="lbl">便便</label><div class="combo-wrap"><input type="number" id="r-poop" placeholder="0"><select class="combo-select" onchange="this.previousElementSibling.value=this.value"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div></div>
        <div><label class="lbl">水腫</label><div class="combo-wrap"><input type="number" id="r-edema" placeholder="0"><select class="combo-select" onchange="this.previousElementSibling.value=this.value"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div></div>
        <div><label class="lbl">飽足</label><div class="combo-wrap"><input type="number" id="r-fullness" placeholder="0"><select class="combo-select" onchange="this.previousElementSibling.value=this.value"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select></div></div>
    </div>
  </div>

  <button class="btn-save" onclick="saveRecord()">儲存今日數據</button>

  <div class="admin-btns">
    <button class="btn-sec" onclick="exportData()">📤 匯出</button>
    <button class="btn-sec" onclick="importData()">📥 匯入</button>
    <button class="btn-sec" style="color:red" onclick="clearAllData()">🗑️ 清空</button>
  </div>
</div>
<div class="toast" id="toast">儲存成功！</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const mealTypes=['早餐','午餐','晚餐','點心','宵夜']; 
const goals={carb:3, prot:3, veg:4, water:2415};
const BASE_URL = "https://health-shortcuts.onrender.com";
let records=JSON.parse(localStorage.getItem('hj_records')||'[]'); 
let meals=[], mealIdCtr=0, exers=[], exerIdCtr=0;

// --- 裁切功能全域變數 ---
let cropper = null;
let currentMealId = null;

// 1. 覆蓋原本的 handleImage 函數
function handleImage(id, file) {
    if (!file) return;
    currentMealId = id; // 記錄是哪一餐要換圖
    const reader = new FileReader();
    reader.onload = (e) => {
        const cropModal = document.getElementById('crop-modal');
        const cropImg = document.getElementById('crop-image');
        cropImg.src = e.target.result;
        cropModal.style.display = 'flex'; // 打開視窗

        if (cropper) cropper.destroy();

        // 啟動 Cropper.js
        cropper = new Cropper(cropImg, {
            aspectRatio: 4 / 3, // 固定 4:3 比例
            viewMode: 1,
            dragMode: 'move',
            autoCropArea: 1
        });
    };
    reader.readAsDataURL(file);
}

// 2. 新增：關閉裁切視窗的函數
function closeCrop() {
    document.getElementById('crop-modal').style.display = 'none';
    if (cropper) cropper.destroy();
}

// 3. 新增：按下「確定裁切」的函數
function confirmCrop() {
    const canvas = cropper.getCroppedCanvas({
        width: 800,  // 固定輸出寬度
        height: 600  // 固定輸出高度 (4:3)
    });
    
    const croppedBase64 = canvas.toDataURL('image/jpeg', 0.8);
    const imgEl = document.getElementById(`img-${currentMealId}`);
    imgEl.src = croppedBase64; // 將裁切後的圖放回預覽框
    
    document.getElementById(`preview-${currentMealId}`).style.display = 'block';
    closeCrop();
    showToast('裁切完成');
}
function toggleExercise(){ document.getElementById('exercise-content').style.display=(document.getElementById('is-exercise').value==='是'?'block':'none'); if(exers.length===0 && document.getElementById('is-exercise').value==='是')addExer(); }

function calcAll(){
    // 1. 飲食計算
    let tc=0,tp=0,tv=0; 
    meals.forEach(id=>{
        tc+=parseFloat(document.getElementById('mcarb-'+id).value)||0;
        tp+=parseFloat(document.getElementById('mprot-'+id).value)||0;
        tv+=parseFloat(document.getElementById('mveg-'+id).value)||0;
    });
    updateBar('carb',tc,goals.carb); 
    updateBar('prot',tp,goals.prot); 
    updateBar('veg',tv,goals.veg);

    // 2. 喝水量計算
    const wVal = parseFloat(document.getElementById('r-water').value)||0;
    const wBar = document.getElementById('bar-water');
    const wStatus = document.getElementById('water-status-txt');
    wBar.style.width = Math.min((wVal/goals.water)*100, 100) + '%';
    if(wVal >= goals.water) { 
        wBar.style.background = 'var(--green)'; 
        wStatus.textContent = '已達標！✨'; 
        wStatus.style.color = 'var(--green)'; 
    } else { 
        wBar.style.background = 'var(--water)'; 
        wStatus.textContent = `還差 ${goals.water - wVal} ml`; 
        wStatus.style.color = 'var(--water)'; 
    }

    // 3. 步數計算 (新增)
    const stepGoal = 6000;
    const sVal = parseFloat(document.getElementById('r-steps').value)||0;
    const sBar = document.getElementById('bar-steps');
    const sStatus = document.getElementById('steps-status-txt');
    sBar.style.width = Math.min((sVal/stepGoal)*100, 100) + '%';
    if(sVal >= stepGoal) {
        sBar.style.background = 'var(--green)';
        sStatus.textContent = '步數已達標！🔥';
        sStatus.style.color = 'var(--green)';
    } else {
        sBar.style.background = 'var(--accent)';
        sStatus.textContent = `還差 ${stepGoal - sVal} 步`;
        sStatus.style.color = 'var(--accent)';
    }
}

function updateBar(k,c,g){ 
    const valEl = document.getElementById('val-'+k);
    if(valEl) valEl.textContent=c.toFixed(1); 
    const bar = document.getElementById('bar-'+k);
    if(bar) bar.style.width=Math.min((c/g)*100,100)+'%';
    if(c >= g && valEl) valEl.classList.add('status-done'); else if(valEl) valEl.classList.remove('status-done');
}

async function onDateChange() {
    const date = document.getElementById('r-date').value;
    if (!date) return;

    // 清空目前畫面
    const mealsWrap = document.getElementById('meals-wrap');
    const exerWrap = document.getElementById('exer-wrap');
    mealsWrap.innerHTML = '';
    exerWrap.innerHTML = '';
    meals = []; exers = [];

    showToast('雲端讀取中...');

    try {
        const response = await fetch(`https://health-shortcuts.onrender.com/get_record?date=${date}&t=${new Date().getTime()}`);
        const cloud = await response.json();

        let r = null;
        if (cloud.status === 'success') {
            r = cloud.data;
            showToast('已載入雲端紀錄');
        } else {
            r = records.find(x => x.date === date);
            if(r) showToast('載入本地快取');
        }

        if (r) {
            // 還原飲食
            if (r.meals && r.meals.length > 0) {
                r.meals.forEach(m => addMeal(m));
            } else {
                addMeal();
            }

            // 還原運動
            document.getElementById('is-exercise').value = r.isExercise || '否';
            toggleExercise();
            if (r.exerList) r.exerList.forEach(e => addExer(e));

            // 還原生活數據
            document.getElementById('r-water').value = r.water || "";
            document.getElementById('r-steps').value = r.steps || "";
            document.getElementById('r-evil').value = r.evil || '否';

            // 還原身體狀況
            const bodyFields = ['stress', 'fatigue', 'poop', 'edema', 'fullness'];
            bodyFields.forEach(f => {
                const el = document.getElementById('r-' + f);
                if (el) el.value = r[f] || "";
            });
        } else {
            // --- 重點修正：當這天沒資料時，強制重置所有輸入欄位 ---
            addMeal(); // 開一個空白餐點
            document.getElementById('is-exercise').value = '否'; // 重置運動開關
            toggleExercise();

            // 重置生活數據為空
            document.getElementById('r-water').value = "";
            document.getElementById('r-steps').value = "";
            document.getElementById('r-evil').value = '否';

            // 重置身體狀況所有項目
            const bodyFields = ['stress', 'fatigue', 'poop', 'edema', 'fullness'];
            bodyFields.forEach(f => {
                const el = document.getElementById('r-' + f);
                if (el) el.value = ""; 
            });
            // -------------------------------------------
        }
    } catch (err) {
        console.error('讀取失敗:', err);
        showToast('無法連線雲端');
    }
    // 最後重新計算進度條，確保進度條也歸零
    setTimeout(() => calcAll(), 100); 
}

function addMeal(d = null) {
    const id = ++mealIdCtr;
    meals.push(id);
    const div = document.createElement('div');
    div.className = 'item-block';

    // 修正點：確保反引號在 </div> 之後就關閉
    div.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
            <select id="mtype-${id}" style="width:auto;border:none;background:none;font-weight:bold">
                ${mealTypes.map(t => `<option ${d?.type === t ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
            <button onclick="this.parentElement.parentElement.remove();meals=meals.filter(x=>x!==${id});calcAll()" style="color:red;border:none;background:none;font-size:12px;cursor:pointer">移除</button>
        </div>
        <div class="row3">
            <div><label class="lbl">主食</label><input type="number" id="mcarb-${id}" value="${d ? d.carb : ''}" placeholder="0" oninput="calcAll()"></div>
            <div><label class="lbl">蛋白</label><input type="number" id="mprot-${id}" value="${d ? d.prot : ''}" placeholder="0" oninput="calcAll()"></div>
            <div><label class="lbl">蔬菜</label><input type="number" id="mveg-${id}" value="${d ? d.veg : ''}" placeholder="0" oninput="calcAll()"></div>
        </div>
        <input type="text" id="mnote-${id}" value="${d?.note || ''}" placeholder="備註..." style="height:36px;margin-bottom:8px">
        <button onclick="document.getElementById('file-${id}').click()" style="width:100%;padding:8px;font-size:12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer">📷 上傳照片</button>
        <input type="file" id="file-${id}" accept="image/*" style="display:none" onchange="handleImage(${id}, this.files[0])">
        <div class="img-preview" id="preview-${id}" style="${d?.img ? 'display:block' : ''}">
            <img src="${d?.img || ''}" id="img-${id}" onclick="reCrop(${id})" style="cursor:pointer; width:100%; height:100%; object-fit:cover;">
        </div>
    `; 

    // 這一行必須在字串外面執行
    document.getElementById('meals-wrap').appendChild(div);
    calcAll();
}

function addExer(d = null) {
    const id = ++exerIdCtr;
    exers.push(id);
    const div = document.createElement('div');
    div.className = 'item-block';
    div.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <label class="lbl">項目</label>
            <button onclick="this.parentElement.parentElement.remove();exers=exers.filter(x=>x!==${id})" style="color:red;border:none;background:none;font-size:12px;cursor:pointer">移除</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input type="text" id="ename-${id}" value="${d?.name || ''}" placeholder="名稱">
            <input type="text" id="estr-${id}" value="${d?.str || ''}" placeholder="內容">
        </div>
    `;
    document.getElementById('exer-wrap').appendChild(div);
}

function reCrop(id) {
    const imgEl = document.getElementById(`img-${id}`);
    if (!imgEl.src || imgEl.src === window.location.href) return;

    currentMealId = id; // 記錄當前操作的餐點 ID
    const cropModal = document.getElementById('crop-modal');
    const cropImg = document.getElementById('crop-image');
    
    // 將現有照片的 src 放入裁切視窗
    cropImg.src = imgEl.src;
    cropModal.style.display = 'flex';

    if (cropper) cropper.destroy();

    // 啟動裁切器
    cropper = new Cropper(cropImg, {
        aspectRatio: 4 / 3,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 1,
        checkOrientation: false // 避免某些雲端圖片轉向問題
    });
}

async function saveRecord() {
    const date = document.getElementById('r-date').value;
    if (!date) return alert("請選擇日期");

    showToast('正在處理圖片與同步數據...');

    try {
        // 1. 處理所有餐點，如果圖片是 base64 就上傳，如果是網址就保留
        const updatedMeals = await Promise.all(meals.map(async (id) => {
            const imgEl = document.getElementById('img-' + id);
            let finalImgUrl = "";

            // 檢查圖片是否需要上傳 (如果是 base64 開頭代表是新選的照片)
            if (imgEl.src.startsWith('data:image')) {
                const res = await fetch(`${BASE_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imgEl.src })
                });
                const uploadData = await res.json();
                if (uploadData.status === 'success') {
                    finalImgUrl = uploadData.url;
                }
            } else if (imgEl.src.startsWith('http')) {
                // 如果已經是雲端網址 (讀取舊紀錄時)，直接保留
                finalImgUrl = imgEl.src;
            }

            return {
                type: document.getElementById('mtype-' + id).value,
                carb: document.getElementById('mcarb-' + id).value,
                prot: document.getElementById('mprot-' + id).value,
                veg: document.getElementById('mveg-' + id).value,
                note: document.getElementById('mnote-' + id).value,
                img: finalImgUrl
            };
        }));

        // 2. 組裝完整資料
        const rec = {
            date: date,
            meals: updatedMeals,
            isExercise: document.getElementById('is-exercise').value,
            exerList: exers.map(id => ({
                name: document.getElementById('ename-' + id).value,
                str: document.getElementById('estr-' + id).value
            })),
            water: document.getElementById('r-water').value,
            steps: document.getElementById('r-steps').value,
            evil: document.getElementById('r-evil').value,
            stress: document.getElementById('r-stress').value,
            fatigue: document.getElementById('r-fatigue').value,
            poop: document.getElementById('r-poop').value,
            edema: document.getElementById('r-edema').value,
            fullness: document.getElementById('r-fullness').value
        };

        // 3. 傳送到後端 save 路由
        const saveRes = await fetch(`${BASE_URL}/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(rec)
        });
        const saveData = await saveRes.json();

        if (saveData.status === 'success') {
            showToast('所有數據與照片已成功同步！');
            // 上傳完後，把畫面的 src 換成真正的 URL，避免重複上傳
            onDateChange(); 
        } else {
            alert(saveData.message);
        }
    } catch (e) {
        console.error(e);
        alert('儲存失敗，請檢查網路或伺服器狀態');
    }
}

function importData(){
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (re) => { try { records = JSON.parse(re.target.result); localStorage.setItem('hj_records', JSON.stringify(records)); alert('匯入成功！'); onDateChange(); } catch(err) { alert('格式不正確'); } };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

async function checkSystemStatus() {
    const statusText = document.querySelector('#status-text');
    const statusDot = document.querySelector('#status-dot');
    const RENDER_URL = "https://health-shortcuts.onrender.com"; 

    async function performCheck() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            const start = Date.now();
            
            await fetch(`${RENDER_URL}/health`, {
                method: 'GET',
                signal: controller.signal,
                cache: "no-cache",
                mode: 'no-cors'  // ← 加這行！避免 CORS 讓 fetch 直接丟 exception
            });
            clearTimeout(timeoutId);
            
            const latency = Date.now() - start;
            statusDot.style.background = "#2ecc71";
            statusText.innerText = `系統已連線 (${latency}ms)`;
            return true;
        } catch (error) {
            console.log("連線嘗試中...", error);
        }
        return false;
    }

    statusDot.style.background = "#f1c40f";
    statusText.innerText = "檢測中...";

    const isOk = await performCheck();

    if (!isOk) {
        statusText.innerText = "伺服器喚醒中...";
        await new Promise(resolve => setTimeout(resolve, 3000));

        const retryOk = await performCheck();

        if (!retryOk) {
            statusDot.style.background = "#e74c3c";
            statusText.innerText = "資料庫休眠中 (請檢查 Aiven)";
        }
    }
}

window.onload = async () => {
    // 1. 設定今日日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('r-date').value = today;
    
    // 2. 先執行連線檢測
    await checkSystemStatus(); 
    
    // 3. 診斷跑完後（不論成功失敗）再讀取數據
    onDateChange(); 
};
